<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your GitHub Repositories</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            text-align: center;
        }
        .repo-list {
            list-style-type: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .repo-item {
            margin: 10px;
            text-align: center;
        }
        .repo-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .repo-description {
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Your GitHub Repositories</h1>
    <ul class="repo-list" id="repos-list"></ul>

    <script>
        const apiUrl = 'https://api.github.com/users/amihsan/repos';

        fetch(apiUrl)
            .then(response => response.json())
            .then(repos => {
                const reposList = document.getElementById('repos-list');
                repos.forEach(repo => {
                    const repoItem = document.createElement('li');
                    repoItem.className = 'repo-item';

                    const repoName = document.createElement('div');
                    repoName.className = 'repo-name';
                    repoName.textContent = repo.name;

                    const repoDescription = document.createElement('div');
                    repoDescription.className = 'repo-description';
                    repoDescription.textContent = repo.description || 'No description provided.';

                    repoItem.appendChild(repoName);
                    repoItem.appendChild(repoDescription);
                    reposList.appendChild(repoItem);
                });
            })
            .catch(error => console.error('Error fetching repositories:', error));
    </script>
</body>
</html>
